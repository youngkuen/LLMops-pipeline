name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v7

      - name: Python 3.11 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 테스트 실행
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v7

      - name: 도커 이미지 빌드 (Dockerfile이 실제로 빌드되는지 검증)
        run: docker build -t automl-pipeline .
